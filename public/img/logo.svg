<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- White background circle -->
  <circle cx="60" cy="60" r="58" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Navy semi-circle arc at bottom -->
  <path d="M 16 82 A 46 46 0 0 1 104 82 Z" fill="#1e3a5f"/>

  <!-- Bar chart inside arc (3 bars, navy shades) -->
  <rect x="29" y="58" width="13" height="24" rx="2.5" fill="#2d5282"/>
  <rect x="48" y="46" width="13" height="36" rx="2.5" fill="#1e3a5f"/>
  <rect x="67" y="52" width="13" height="30" rx="2.5" fill="#2d5282"/>

  <!-- Wheat stalk - center vertical stem -->
  <line x1="60" y1="80" x2="60" y2="18" stroke="#f97316" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Grain pairs - left side -->
  <ellipse cx="52" cy="70" rx="6" ry="3.2" fill="#f97316" transform="rotate(-38 52 70)"/>
  <ellipse cx="49" cy="57" rx="6" ry="3.2" fill="#f97316" transform="rotate(-42 49 57)"/>
  <ellipse cx="48" cy="44" rx="5.5" ry="3" fill="#f97316" transform="rotate(-46 48 44)"/>

  <!-- Grain pairs - right side -->
  <ellipse cx="68" cy="70" rx="6" ry="3.2" fill="#f97316" transform="rotate(38 68 70)"/>
  <ellipse cx="71" cy="57" rx="6" ry="3.2" fill="#f97316" transform="rotate(42 71 57)"/>
  <ellipse cx="72" cy="44" rx="5.5" ry="3" fill="#f97316" transform="rotate(46 72 44)"/>

  <!-- Wheat tip -->
  <ellipse cx="60" cy="20" rx="4.5" ry="7" fill="#f97316"/>
</svg>
